  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.11/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.7/dist/purify.min.js"></script>
  <script>
(function () {
  // ---------------------------------------------------------------------------
  // Theme controller — morning / afternoon / night, with manual override.
  // Mode is stored in localStorage as "auto" | "light" | "afternoon" | "dark".
  // The early head script already painted a best-effort theme; here we wire the
  // toggle UI, re-evaluate on a 60-second tick, and broadcast the resolved
  // theme to the habit-builder iframe via postMessage.
  // ---------------------------------------------------------------------------
  const HT = window.HeartbeatTheme;
  const themeToggleEl = document.getElementById("theme-toggle");
  const habitsFrameElEarly = document.getElementById("habits-frame");

  /** Apply resolved theme to <html> and notify the iframe. */
  function applyTheme(theme) {
    const t = HT.normalizeTheme(theme);
    if (document.documentElement.dataset.theme !== t) {
      document.documentElement.dataset.theme = t;
    }
    try {
      const frame = habitsFrameElEarly || document.getElementById("habits-frame");
      if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage(
          { source: "scheduler-shell", type: "theme", theme: t },
          window.location.origin,
        );
      }
    } catch (_) {}
  }

  function resolveAndApply() {
    const mode = HT.readMode();
    applyTheme(HT.resolveTheme(mode));
    refreshThemeToggleChrome(mode);
  }

  function refreshThemeToggleChrome(mode) {
    if (!themeToggleEl) return;
    const buttons = themeToggleEl.querySelectorAll("button[data-theme-mode]");
    buttons.forEach(function (b) {
      const m = b.getAttribute("data-theme-mode");
      b.classList.toggle("active", m === mode);
      b.setAttribute("aria-pressed", m === mode ? "true" : "false");
    });
  }

  if (themeToggleEl) {
    themeToggleEl.addEventListener("click", function (ev) {
      const target = ev.target;
      if (!(target instanceof HTMLElement)) return;
      const btn = target.closest("button[data-theme-mode]");
      if (!btn) return;
      const mode = btn.getAttribute("data-theme-mode") || "auto";
      try {
        localStorage.setItem(HT.LS_KEY, mode);
      } catch (_) {}
      resolveAndApply();
    });
  }

  resolveAndApply();
  setInterval(resolveAndApply, 60_000);
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) resolveAndApply();
  });

  const appMenuOpenBtn = document.getElementById("app-menu-open");
  const appMenuCloseBtn = document.getElementById("app-menu-close");
  const appSettingsPanel = document.getElementById("app-settings-panel");
  const appSettingsBackdrop = document.getElementById("app-settings-backdrop");
  let appSettingsOpen = false;

  function setAppSettingsOpen(open) {
    appSettingsOpen = !!open;
    if (appSettingsPanel) {
      appSettingsPanel.classList.toggle("open", appSettingsOpen);
      appSettingsPanel.setAttribute("aria-hidden", appSettingsOpen ? "false" : "true");
    }
    if (appMenuOpenBtn) {
      appMenuOpenBtn.setAttribute("aria-expanded", appSettingsOpen ? "true" : "false");
    }
    if (appSettingsBackdrop) {
      appSettingsBackdrop.hidden = !appSettingsOpen;
      appSettingsBackdrop.setAttribute("aria-hidden", appSettingsOpen ? "false" : "true");
      appSettingsBackdrop.classList.toggle("visible", appSettingsOpen);
    }
    document.body.classList.toggle("app-settings-open", appSettingsOpen);
    if (appSettingsOpen && appMenuCloseBtn) {
      appMenuCloseBtn.focus();
    } else if (!appSettingsOpen && appMenuOpenBtn) {
      appMenuOpenBtn.focus();
    }
  }

  if (appMenuOpenBtn && appSettingsPanel) {
    appMenuOpenBtn.addEventListener("click", function () {
      setAppSettingsOpen(true);
    });
  }
  if (appMenuCloseBtn) {
    appMenuCloseBtn.addEventListener("click", function () {
      setAppSettingsOpen(false);
    });
  }
  if (appSettingsBackdrop) {
    appSettingsBackdrop.addEventListener("click", function () {
      setAppSettingsOpen(false);
    });
  }
  document.addEventListener("keydown", function (ev) {
    if (ev.key === "Escape" && appSettingsOpen) {
      setAppSettingsOpen(false);
    }
  });

  const chatScroll = document.getElementById("chat-scroll");

  /** Return the live transcript mount (fixes hydrate/reset that used to nuke `#chat-scroll` innerHTML). */
  function getChatStreamMount() {
    if (!chatScroll) return null;
    let el = document.getElementById("chat-stream");
    if (el && chatScroll.contains(el)) return el;
    el = document.createElement("div");
    el.id = "chat-stream";
    el.className = "chat-stream";
    chatScroll.appendChild(el);
    return el;
  }

  const todayLabel = document.getElementById("today-label");
  const promptEl = document.getElementById("prompt");
  const sendBtn = document.getElementById("send");
  const clearBtn = document.getElementById("clear-thread");
  const statusEl = document.getElementById("chat-status");
  const queuePanelEl = document.getElementById("chat-queue");
  const llmPill = document.getElementById("llm-status-pill");
  const agendaHabitsSubhead = document.getElementById("agenda-habits-subhead");
  const agendaHabitsList = document.getElementById("agenda-habits-list");
  const agendaDbList = document.getElementById("agenda-db-list");
  const btnPrevDay = document.getElementById("btn-prev-day");
  const btnNextDay = document.getElementById("btn-next-day");
  const btnClearScheduleDay = document.getElementById("btn-clear-schedule-day");
  const focusDateLabelEl = document.getElementById("focus-date-label");
  const focusDateInput = document.getElementById("focus-date-input");

  /** @type {boolean} */
  let llmOnline = false;
  /** @type {boolean} */
  let requestInFlight = false;

  /** @type {string} */
  let activeChatPhase = "";

  async function copyTextToClipboard(text) {
    try {
      await navigator.clipboard.writeText(text);
      return true;
    } catch (_) {
      try {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.setAttribute("readonly", "");
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        document.execCommand("copy");
        document.body.removeChild(ta);
        return true;
      } catch (_) {
        return false;
      }
    }
  }

  function refreshComposeStatus() {
    let t = "";
    if (requestInFlight) {
      t = activeChatPhase || "Thinking…";
    }
    statusEl.textContent = t;
  }

  function setChatPhase(text) {
    activeChatPhase = String(text || "");
    refreshComposeStatus();
  }

  function refreshSendEnabled() {
    sendBtn.disabled = !llmOnline;
  }

  /** FIFO of user messages not yet applied to the model (draft follow-ups). */
  const pendingChatQueue = [];
  let chatQueueIdSeq = 1;
  function newChatQueueId() {
    chatQueueIdSeq += 1;
    return "q" + chatQueueIdSeq;
  }

  /** @type {Promise<void> | null} */
  let chatQueueDrainPromise = null;

  function svgQueueIcon(paths) {
    const ns = "http://www.w3.org/2000/svg";
    const svg = document.createElementNS(ns, "svg");
    svg.setAttribute("viewBox", "0 0 24 24");
    svg.setAttribute("aria-hidden", "true");
    for (let pi = 0; pi < paths.length; pi += 1) {
      const p = document.createElementNS(ns, "path");
      p.setAttribute("d", paths[pi]);
      svg.appendChild(p);
    }
    return svg;
  }

  function makeQueueActionBtn(act, label, paths, danger) {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "queue-act" + (danger ? " danger" : "");
    btn.dataset.act = act;
    btn.title = label;
    btn.setAttribute("aria-label", label);
    btn.appendChild(svgQueueIcon(paths));
    return btn;
  }

  function findChatQueueIndex(qid) {
    for (let i = 0; i < pendingChatQueue.length; i += 1) {
      if (pendingChatQueue[i].id === qid) return i;
    }
    return -1;
  }

  function renderChatQueuePanel() {
    if (!queuePanelEl) return;
    try {
      const total = pendingChatQueue.length;
      while (queuePanelEl.firstChild) queuePanelEl.removeChild(queuePanelEl.firstChild);
      if (total === 0) {
        queuePanelEl.hidden = true;
        queuePanelEl.style.display = "none";
        return;
      }
      queuePanelEl.removeAttribute("hidden");
      queuePanelEl.style.display = "flex";
      if (queuePanelEl.dataset.collapsed !== "true") {
        queuePanelEl.dataset.collapsed = "false";
      }
      const collapsed = queuePanelEl.dataset.collapsed === "true";

      const head = document.createElement("div");
      head.className = "queue-head";
      head.setAttribute("role", "button");
      head.tabIndex = 0;
      head.setAttribute("aria-expanded", collapsed ? "false" : "true");
      const twisty = document.createElement("span");
      twisty.className = "queue-twisty";
      twisty.textContent = collapsed ? "▸" : "▾";
      head.appendChild(twisty);
      const count = document.createElement("span");
      count.className = "queue-count";
      count.textContent = total + " queued";
      head.appendChild(count);
      queuePanelEl.appendChild(head);

      const ul = document.createElement("ul");
      ul.className = "queue-list";
      for (let qi = 0; qi < pendingChatQueue.length; qi += 1) {
        const item = pendingChatQueue[qi];
        const li = document.createElement("li");
        li.className = "queue-row";
        li.dataset.qid = item.id;
        li.setAttribute("role", "listitem");

        const bullet = document.createElement("span");
        bullet.className = "queue-bullet";
        bullet.setAttribute("aria-hidden", "true");
        li.appendChild(bullet);

        const text = document.createElement("span");
        text.className = "queue-text";
        const oneLine = String(item.text || "").replace(/\s+/g, " ").trim();
        text.textContent = oneLine;
        text.title = oneLine;
        li.appendChild(text);

        const actions = document.createElement("span");
        actions.className = "queue-actions";
        actions.appendChild(
          makeQueueActionBtn("edit", "Edit message", [
            "M4 20h4l10-10-4-4L4 16v4z",
            "M14 6l4 4",
          ]),
        );
        actions.appendChild(
          makeQueueActionBtn("up", "Send next", [
            "M12 19V5",
            "M5 12l7-7 7 7",
          ]),
        );
        actions.appendChild(
          makeQueueActionBtn(
            "trash",
            "Remove",
            ["M3 6h18", "M8 6V4h8v2", "M6 6l1 14h10l1-14"],
            true,
          ),
        );
        li.appendChild(actions);
        ul.appendChild(li);
      }
      queuePanelEl.appendChild(ul);
    } catch (err) {
      // eslint-disable-next-line no-console
      console.error("[queue] render failed:", err);
    }
  }

  function enqueueChatUserText(text) {
    const trimmed = String(text || "").trim();
    if (!trimmed) return null;
    const item = { id: newChatQueueId(), text: trimmed };
    pendingChatQueue.push(item);
    renderChatQueuePanel();
    refreshSendEnabled();
    return item;
  }

  function clearPendingChatQueue() {
    pendingChatQueue.length = 0;
    renderChatQueuePanel();
    refreshSendEnabled();
  }

  function trashChatQueueItem(qid) {
    const i = findChatQueueIndex(qid);
    if (i < 0) return;
    pendingChatQueue.splice(i, 1);
    renderChatQueuePanel();
    refreshSendEnabled();
  }

  function promoteChatQueueItem(qid) {
    const i = findChatQueueIndex(qid);
    if (i < 0) return;
    const [item] = pendingChatQueue.splice(i, 1);
    pendingChatQueue.splice(0, 0, item);
    renderChatQueuePanel();
  }

  function editChatQueueItem(qid) {
    const i = findChatQueueIndex(qid);
    if (i < 0) return;
    const [item] = pendingChatQueue.splice(i, 1);
    const stash = promptEl.value.trim();
    if (stash) {
      pendingChatQueue.unshift({ id: newChatQueueId(), text: stash });
    }
    promptEl.value = item.text;
    promptEl.focus();
    try {
      const len = promptEl.value.length;
      promptEl.setSelectionRange(len, len);
    } catch (_) {}
    renderChatQueuePanel();
    refreshSendEnabled();
  }

  function ensureChatQueueDrain() {
    if (chatQueueDrainPromise != null) return;
    if (!llmOnline || pendingChatQueue.length === 0) return;
    chatQueueDrainPromise = (async function () {
      let stoppedAfterError = false;
      try {
        while (llmOnline && pendingChatQueue.length > 0) {
          const next = pendingChatQueue[0];
          if (!next) break;
          try {
            await runChatTurn(next.text, function onUserBubblePainted() {
              const rm = findChatQueueIndex(next.id);
              if (rm >= 0) pendingChatQueue.splice(rm, 1);
              renderChatQueuePanel();
              refreshSendEnabled();
            });
          } catch (err) {
            // eslint-disable-next-line no-console
            console.error("runChatTurn rejected", err);
            statusEl.textContent =
              "Send failed: " + String(err && err.message ? err.message : err);
            stoppedAfterError = true;
            break;
          } finally {
            renderChatQueuePanel();
          }
        }
      } finally {
        chatQueueDrainPromise = null;
        renderChatQueuePanel();
        refreshComposeStatus();
        if (!stoppedAfterError && llmOnline && pendingChatQueue.length > 0) {
          ensureChatQueueDrain();
        }
      }
    })();
  }

  if (queuePanelEl) {
    queuePanelEl.addEventListener("click", function (ev) {
      const t = ev.target;
      if (!(t instanceof Element)) return;
      const head = t.closest(".queue-head");
      if (head && queuePanelEl.contains(head)) {
        queuePanelEl.dataset.collapsed =
          queuePanelEl.dataset.collapsed === "true" ? "false" : "true";
        renderChatQueuePanel();
        return;
      }
      const btn = t.closest(".queue-act");
      if (!btn || !(btn instanceof HTMLElement) || !btn.dataset.act) return;
      const row = btn.closest(".queue-row");
      if (!row || !(row instanceof HTMLElement) || !row.dataset.qid) return;
      const qid = row.dataset.qid;
      const act = btn.dataset.act;
      if (act === "edit") editChatQueueItem(qid);
      else if (act === "up") promoteChatQueueItem(qid);
      else if (act === "trash") trashChatQueueItem(qid);
    });
    queuePanelEl.addEventListener("keydown", function (ev) {
      const t = ev.target;
      if (!(t instanceof Element)) return;
      const head = t.closest(".queue-head");
      if (!head) return;
      if (ev.key !== "Enter" && ev.key !== " ") return;
      ev.preventDefault();
      queuePanelEl.dataset.collapsed =
        queuePanelEl.dataset.collapsed === "true" ? "false" : "true";
      renderChatQueuePanel();
    });
  }

  async function pollLlmHealth() {
    const wasOnline = llmOnline;
    try {
      const r = await fetch("/llm-health", { cache: "no-store" });
      const j = await r.json().catch(function () {
        return {};
      });
      llmOnline = !!j.online;
      llmPill.classList.remove("muted", "online", "offline");
      if (llmOnline) {
        llmPill.classList.add("online");
        const loaded = j.model_loaded ? " · model OK" : "";
        llmPill.textContent = "LLM API online" + loaded;
      } else {
        llmPill.classList.add("offline");
        llmPill.textContent = "Offline — set VLLM_14B_BASE_URL and run scheduler_llm_gateway.py";
      }
      llmPill.title =
        typeof j.detail === "string"
          ? j.detail
          : j.upstream
            ? "Upstream " + String(j.upstream)
            : "LLM gateway";
    } catch (e) {
      llmOnline = false;
      llmPill.classList.remove("muted", "online", "offline");
      llmPill.classList.add("offline");
      llmPill.textContent = "Status error";
      llmPill.title = String(e && e.message ? e.message : e);
    }
    refreshSendEnabled();
    refreshComposeStatus();
    if (!wasOnline && llmOnline && pendingChatQueue.length > 0) {
      ensureChatQueueDrain();
    }
  }

  void pollLlmHealth();
  setInterval(function () {
    void pollLlmHealth();
  }, 10000);

  // ---------------------------------------------------------------------------
  // Google Calendar sync — surface connection state and let the user kick off
  // the OAuth flow / a manual incremental sync. Polling refreshes the pill so
  // events created on Google appear without a page reload.
  // ---------------------------------------------------------------------------
  const gcalPill = document.getElementById("gcal-status-pill");
  const gcalBtn = document.getElementById("gcal-action-btn");

  function setGcalPill(label, mode, hint) {
    gcalPill.classList.remove("muted", "online", "offline");
    gcalPill.classList.add(mode || "muted");
    gcalPill.textContent = label;
    if (hint) gcalPill.title = hint;
  }

  function gcalReconnectHint(body) {
    const credErr = body && body.credential_error;
    const detail = body && body.credential_error_detail;
    if (detail) return String(detail);
    if (credErr === "refresh_failed") {
      return "Saved Google token expired or was revoked. Click Connect Calendar to sign in again.";
    }
    if (credErr === "need_browser") {
      return "Google Calendar needs browser sign-in. Click Connect Calendar.";
    }
    if (body && body.last_error) return String(body.last_error).split("\n")[0];
    if (body && body.token_path) return String(body.token_path);
    return "Google Calendar is not connected.";
  }

  function gcalLog(message, extra) {
    try {
      if (extra !== undefined) console.info("[gcal]", message, extra);
      else console.info("[gcal]", message);
    } catch (_) {}
  }

  function showGcalChatStatus(text) {
    if (text) statusEl.textContent = String(text);
  }

  let gcalOAuthPollTimer = null;

  function stopGcalOAuthWatch() {
    if (gcalOAuthPollTimer) {
      clearInterval(gcalOAuthPollTimer);
      gcalOAuthPollTimer = null;
    }
  }

  window.addEventListener("message", function (ev) {
    if (!ev.data || ev.data.type !== "gcal-oauth") return;
    if (ev.origin !== window.location.origin) return;
    gcalLog("oauth message", { ok: ev.data.ok, error: ev.data.error || "" });
    stopGcalOAuthWatch();
    if (ev.data.ok) {
      showGcalChatStatus("Google Calendar connected.");
      void finishGcalConnectSuccess();
    } else {
      const err = ev.data.error || "Google Calendar connection failed.";
      setGcalPill("GCal reconnect needed", "offline", err);
      showGcalChatStatus(err);
    }
    gcalBtn.disabled = false;
    gcalBtn.textContent = gcalBtn.dataset.action === "sync" ? "Sync now" : "Connect Calendar";
  });

  async function finishGcalConnectSuccess() {
    await pollGcalStatus();
    try {
      const tzBody = JSON.stringify({
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      });
      const r = await fetch("/api/calendar/sync", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: tzBody,
      });
      const body = await r.json().catch(function () { return {}; });
      gcalLog("post-connect sync", { ok: r.ok, errors: body && body.outcome && body.outcome.errors });
      if (body && body.status) applyGcalStatusBody(body.status);
      try { await reloadDbAgenda(); } catch (_) {}
    } catch (e) {
      gcalLog("post-connect sync failed", e && e.message ? e.message : e);
    }
  }

  async function beginGcalConnect() {
    const tz = encodeURIComponent(Intl.DateTimeFormat().resolvedOptions().timeZone);
    gcalLog("oauth start");
    const r = await fetch("/api/calendar/oauth/start?timezone=" + tz, { cache: "no-store" });
    const body = await r.json().catch(function () { return {}; });
    if (!r.ok || !body || !body.authorization_url) {
      const err = (body && body.error) || r.statusText || "Could not start Google sign-in";
      setGcalPill("GCal error", "offline", String(err));
      showGcalChatStatus(String(err));
      gcalLog("oauth start failed", err);
      gcalBtn.disabled = false;
      gcalBtn.textContent = "Connect Calendar";
      return;
    }
    gcalLog("oauth start ok");
    const popup = window.open(
      body.authorization_url,
      "gcal-oauth",
      "width=520,height=720,noopener=no,noreferrer=no",
    );
    if (!popup) {
      const msg = "Popup blocked. Allow popups for this site, then try again.";
      setGcalPill("GCal reconnect needed", "offline", msg);
      showGcalChatStatus(msg + " Opening sign-in in a new tab.");
      gcalLog("oauth popup blocked");
      window.open(body.authorization_url, "_blank");
      gcalBtn.disabled = false;
      gcalBtn.textContent = "Connect Calendar";
      return;
    }
    stopGcalOAuthWatch();
    gcalOAuthPollTimer = setInterval(async function () {
      if (popup.closed) {
        stopGcalOAuthWatch();
        gcalLog("oauth popup closed");
        await pollGcalStatus();
        gcalBtn.disabled = false;
        gcalBtn.textContent = "Connect Calendar";
        return;
      }
      try {
        const sr = await fetch("/api/calendar/status", { cache: "no-store" });
        const status = await sr.json().catch(function () { return {}; });
        if (status && status.credentials_ok) {
          gcalLog("oauth status poll connected");
          stopGcalOAuthWatch();
          try { popup.close(); } catch (_) {}
          showGcalChatStatus("Google Calendar connected.");
          await finishGcalConnectSuccess();
          gcalBtn.disabled = false;
          gcalBtn.textContent = "Sync now";
        }
      } catch (_) {}
    }, 2000);
  }

  function gcalNeedsReconnect(body) {
    if (!body || !body.enabled) return true;
    if (!body.token_ok) return true;
    if (body.credentials_ok === false) return true;
    const err = String(body.credential_error || body.last_error || "").toLowerCase();
    return err === "refresh_failed" || err === "need_browser" || err.includes("needs_browser");
  }

  function applyGcalStatusBody(body) {
    if (!body || body.available === false) {
      setGcalPill("GCal off", "muted", body && body.reason);
      gcalBtn.hidden = true;
      return;
    }
    if (!body.secrets_ok) {
      setGcalPill("GCal not configured", "offline", body.secrets_path);
      gcalBtn.hidden = true;
      return;
    }
    if (body.secrets_type_ok === false) {
      setGcalPill("GCal bad OAuth config", "offline", "OAuth JSON must be a Desktop app (installed) client.");
      gcalBtn.hidden = true;
      return;
    }
    if (gcalNeedsReconnect(body)) {
      const label = body.token_ok ? "GCal reconnect needed" : "GCal disconnected";
      setGcalPill(label, "offline", gcalReconnectHint(body));
      gcalBtn.hidden = false;
      gcalBtn.dataset.action = "connect";
      gcalBtn.textContent = "Connect Calendar";
      return;
    }
    const stamp = body.last_sync_at
      ? new Date(body.last_sync_at).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })
      : "—";
    const errorPart = body.last_error ? " · " + String(body.last_error).split("\n")[0] : "";
    const tzPart = body.push_timezone ? " · push TZ " + body.push_timezone : "";
    setGcalPill(
      "GCal " + (body.calendar_id || "primary") + " · " + stamp,
      body.last_error ? "offline" : "online",
      "Last sync " + stamp + errorPart + tzPart,
    );
    gcalBtn.hidden = false;
    gcalBtn.dataset.action = "sync";
    gcalBtn.textContent = "Sync now";
  }

  let gcalLastSyncAtSeen = 0;
  async function pollGcalStatus() {
    try {
      const r = await fetch("/api/calendar/status", { cache: "no-store" });
      const body = await r.json().catch(function () { return {}; });
      applyGcalStatusBody(body);
      const stamp = Number(body && body.last_sync_at) || 0;
      if (stamp > 0 && stamp !== gcalLastSyncAtSeen) {
        gcalLastSyncAtSeen = stamp;
        try { await reloadDbAgenda(); } catch (_) {}
      }
    } catch (e) {
      setGcalPill("GCal error", "offline", String(e && e.message ? e.message : e));
      gcalBtn.hidden = true;
    }
  }

  gcalBtn.addEventListener("click", async function () {
    const action = gcalBtn.dataset.action;
    if (!action) return;
    const previous = gcalBtn.textContent;
    gcalBtn.disabled = true;
    gcalBtn.textContent = action === "connect" ? "Opening browser…" : "Syncing…";
    try {
      if (action === "connect") {
        await beginGcalConnect();
        return;
      }
      const tzBody = JSON.stringify({
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      });
      const init = {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: tzBody,
      };
      gcalLog("sync start");
      const r = await fetch("/api/calendar/sync", init);
      const body = await r.json().catch(function () { return {}; });
      gcalLog("sync response", { ok: r.ok, errors: body && body.outcome && body.outcome.errors });
      if (!r.ok) {
        setGcalPill("GCal error", "offline", String((body && body.error) || r.statusText || r.status));
      } else if (body && body.status) {
        applyGcalStatusBody(body.status);
      }
      if (body && body.error) setGcalPill("GCal error", "offline", String(body.error));
      const syncErrors = body && body.outcome && Array.isArray(body.outcome.errors)
        ? body.outcome.errors.filter(Boolean)
        : [];
      if (syncErrors.length) {
        const first = String(syncErrors[0]);
        const status = body && body.status;
        showGcalChatStatus(first);
        if (/^oauth:/i.test(first) || (status && gcalNeedsReconnect(status))) {
          applyGcalStatusBody(Object.assign({}, status || {}, {
            credentials_ok: false,
            credential_error: status && status.credential_error
              ? status.credential_error
              : first.replace(/^oauth:\s*/i, ""),
            last_error: first,
          }));
        } else {
          setGcalPill("GCal sync failed", "offline", first);
        }
      }
      try { await reloadDbAgenda(); } catch (_) {}
    } catch (e) {
      setGcalPill("GCal error", "offline", String(e && e.message ? e.message : e));
      gcalLog("gcal action failed", e && e.message ? e.message : e);
    } finally {
      if (action !== "connect" || !gcalOAuthPollTimer) {
        gcalBtn.disabled = false;
        if (gcalBtn.textContent === "Opening browser…" || gcalBtn.textContent === "Syncing…") {
          gcalBtn.textContent = previous;
        }
      }
      void pollGcalStatus();
    }
  });

  void pollGcalStatus();
  setInterval(function () { void pollGcalStatus(); }, 30000);

  /** Past turns for /chat; use ``chatHistory`` (never ``history`` — that is ``window.history``). */
  /** @type {{role: string, content: string}[]} */
  let chatHistory = [];

  const HABIT_DB_NAME = "scheduler-habit-builder-db";
  const HABIT_DB_VERSION = 1;
  const HABIT_STORE = "state";
  const HABIT_LS_BACKUP = "scheduler-habit-builder-backup";

  /** @type {{ id: string, title: string, start: string, days: Record<string, boolean> }[]} */
  let latestHabits = [];

  /** Rows from the last completed GET /api/tasks load for the saved plan list. */
  let latestSavedPlanTasks = [];

  /** @type {{ habit_id: string, title: string, duration_minutes: number, target_date: string, logged: boolean, reason: string }[]} */
  let latestMandatoryHabits = [];

  let habitLogInFlight = false;

  function renderAssistantMarkdown(assistantMarkdown) {
    const src = displayTextForMessage("assistant", assistantMarkdown);
    if (!src.trim()) return "";
    const purifyReady = typeof DOMPurify !== "undefined" && typeof DOMPurify.sanitize === "function";
    const markedReady =
      typeof marked !== "undefined" &&
      marked &&
      typeof marked.parse === "function";
    if (!markedReady || !purifyReady) {
      return "";
    }
    try {
      if (typeof marked.setOptions === "function") {
        marked.setOptions({
          breaks: false,
          gfm: true,
          headerIds: false,
          mangle: false,
        });
      }
      let html = marked.parse(src, { async: false });
      if (!html || typeof html !== "string") {
        html = String(html ?? "");
      }
      return DOMPurify.sanitize(html, {
        ALLOWED_TAGS: [
          "a",
          "blockquote",
          "br",
          "code",
          "del",
          "div",
          "em",
          "h1",
          "h2",
          "h3",
          "h4",
          "h5",
          "h6",
          "hr",
          "li",
          "ol",
          "p",
          "pre",
          "span",
          "strong",
          "table",
          "tbody",
          "td",
          "th",
          "thead",
          "tr",
          "ul",
        ],
        ALLOWED_ATTR: ["href", "title", "target", "rel", "colspan", "rowspan"],
      });
    } catch (_) {
      return "";
    }
  }

  function assistantMountMarkdown(el, markdownSrc) {
    if (!el) return;
    el.classList.add("msg-markdown");
    const html = renderAssistantMarkdown(markdownSrc);
    if (html.trim()) {
      el.innerHTML = html;
      return;
    }
    el.textContent = displayTextForMessage("assistant", markdownSrc);
  }

  /** Local calendar day shown in the planner (`YYYY-MM-DD`). */
  /** @type {string} */
  let focusDateIso = "";

  /** Undated bullets in the last model reply use this calendar anchor (send-time local date). */
  /** @type {string} */
  let lastAssistClientDateIso = "";

  /** Gateway ``import_default_plan_date`` for SQLite/GCal import of undated bullets. */
  /** @type {string} */
  let lastImportDefaultPlanDateIso = "";

  function pad2(n) {
    return String(n).padStart(2, "0");
  }

  function localDateISO(d) {
    return d.getFullYear() + "-" + pad2(d.getMonth() + 1) + "-" + pad2(d.getDate());
  }

  focusDateIso = localDateISO(new Date());
  lastAssistClientDateIso = focusDateIso;
  lastImportDefaultPlanDateIso = focusDateIso;

  function addDaysIso(iso, deltaDays) {
    const parts = iso.split("-").map(Number);
    const t = new Date(parts[0], parts[1] - 1, parts[2]);
    t.setDate(t.getDate() + deltaDays);
    return localDateISO(t);
  }

  function formatLongDateLabel(iso) {
    const parts = iso.split("-").map(Number);
    const dt = new Date(parts[0], parts[1] - 1, parts[2]);
    return new Intl.DateTimeFormat(undefined, {
      weekday: "long",
      month: "long",
      day: "numeric",
      year: "numeric",
    }).format(dt);
  }

  function refreshFocusChrome() {
    const label = formatLongDateLabel(focusDateIso);
    if (focusDateLabelEl) {
      focusDateLabelEl.textContent = label;
      focusDateLabelEl.setAttribute("aria-label", "Choose planner date, currently " + label);
    }
    if (focusDateInput) focusDateInput.value = focusDateIso;
    const todayIso = localDateISO(new Date());
    if (todayLabel) {
      todayLabel.textContent =
        focusDateIso === todayIso
          ? "Showing — " + label + " (today)"
          : "Showing — " + label;
    }
  }

  function setPlannerFocusIso(iso) {
    if (!iso || !/^\d{4}-\d{2}-\d{2}$/.test(iso)) return;
    if (iso === focusDateIso) {
      refreshFocusChrome();
      return;
    }
    focusDateIso = iso;
    refreshFocusChrome();
    void reloadDbAgenda();
    void syncHabitsFromStorage();
  }

  function openFocusDatePicker() {
    if (!focusDateInput) return;
    focusDateInput.value = focusDateIso;
    if (typeof focusDateInput.showPicker === "function") {
      try {
        focusDateInput.showPicker();
        return;
      } catch (_) {
        /* fall through */
      }
    }
    focusDateInput.click();
  }

  function bumpFocusDay(delta) {
    setPlannerFocusIso(addDaysIso(focusDateIso, delta));
  }

  if (btnPrevDay) btnPrevDay.addEventListener("click", () => bumpFocusDay(-1));
  if (btnNextDay) btnNextDay.addEventListener("click", () => bumpFocusDay(1));
  if (focusDateInput) {
    focusDateInput.addEventListener("change", () => {
      const v = focusDateInput.value;
      if (v) setPlannerFocusIso(v);
    });
  }
  if (focusDateLabelEl) {
    focusDateLabelEl.addEventListener("click", () => openFocusDatePicker());
  }

  function resetChatAndPreviewUi(msgStatus) {
    clearPendingChatQueue();
    chatHistory = [];
    clearChatTranscript();
    refreshComposeStatus();
    void reloadDbAgenda();
    if (typeof msgStatus === "string") statusEl.textContent = msgStatus;
  }

  if (btnClearScheduleDay) {
    btnClearScheduleDay.addEventListener("click", function () {
      const label = formatLongDateLabel(focusDateIso);
      if (
        !confirm(
          "Clear all saved tasks for " +
            label +
            ", remove every overlapping event from your synced Google Calendar for that date, " +
            "and reset the chat? This cannot be undone.",
        )
      ) {
        return;
      }
      btnClearScheduleDay.disabled = true;
      void (async function () {
        try {
          const r = await fetch("/api/tasks/clear_day", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              date: focusDateIso,
              clear_conversation: true,
              timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            }),
          });
          if (!r.ok) {
            const t = await r.text().catch(() => "");
            statusEl.textContent = "Clear day failed (" + r.status + "): " + t;
            return;
          }
          resetChatAndPreviewUi("(schedule cleared for " + label + ")");
        } catch (e) {
          statusEl.textContent = String(e && e.message ? e.message : e);
        } finally {
          btnClearScheduleDay.disabled = false;
        }
      })();
    });
  }

  function clientCalendarPayload() {
    const now = new Date();
    return {
      date_iso: localDateISO(now),
      minute_of_day: now.getHours() * 60 + now.getMinutes(),
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      planner_focus_date_iso: focusDateIso,
    };
  }

  async function syncCalendarBeforeChat() {
    if (!gcalBtn || gcalBtn.dataset.action !== "sync" || gcalBtn.disabled) {
      return;
    }
    try {
      const r = await fetch("/api/calendar/sync", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        }),
      });
      if (r.ok) {
        try {
          await reloadDbAgenda();
        } catch (_) {}
      }
    } catch (_) {}
  }

  function durationLabelFromMinutes(dm) {
    const h = Math.floor(dm / 60);
    const mm = dm % 60;
    return h + "h" + String(mm).padStart(2, "0") + "m";
  }

  async function reloadDbAgenda() {
    if (!agendaDbList) return;
    const requestedDate = focusDateIso;
    try {
      const r = await fetch("/api/tasks?date=" + encodeURIComponent(requestedDate), {
        cache: "no-store",
      });
      if (!r.ok) {
        if (focusDateIso === requestedDate) {
          latestSavedPlanTasks = [];
          renderTaskCards(agendaDbList, [], "Saved plan unavailable.");
        }
        return;
      }
      const j = await r.json().catch(() => ({ plan_date: requestedDate, tasks: [] }));
      if (focusDateIso !== requestedDate) return;
      const respDate =
        typeof j.plan_date === "string" && j.plan_date ? j.plan_date : requestedDate;
      if (respDate !== requestedDate) return;
      const tasks = j.tasks || [];
      latestSavedPlanTasks = tasks;
      renderTaskCards(agendaDbList, tasks, "No saved tasks for this day yet.", {
        allowComplete: true,
      });
    } catch (_) {
      if (focusDateIso === requestedDate) {
        latestSavedPlanTasks = [];
        renderTaskCards(agendaDbList, [], "Saved plan unavailable.");
      }
    }
  }

  function openHabitDb() {
    return new Promise(function (resolve, reject) {
      const req = indexedDB.open(HABIT_DB_NAME, HABIT_DB_VERSION);
      req.onerror = function () {
        reject(req.error);
      };
      req.onupgradeneeded = function (e) {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(HABIT_STORE)) {
          db.createObjectStore(HABIT_STORE, { keyPath: "id" });
        }
      };
      req.onsuccess = function () {
        resolve(req.result);
      };
    });
  }

  async function readHabitStateRow() {
    try {
      const db = await openHabitDb();
      return await new Promise(function (resolve, reject) {
        const tx = db.transaction(HABIT_STORE, "readonly");
        const q = tx.objectStore(HABIT_STORE).get("default");
        q.onsuccess = function () {
          resolve(q.result ?? null);
        };
        q.onerror = function () {
          reject(q.error);
        };
      });
    } catch (_) {
      return null;
    }
  }

  function habitsFromLsBackup() {
    try {
      const raw = localStorage.getItem(HABIT_LS_BACKUP);
      if (!raw) return null;
      const row = JSON.parse(raw);
      if (!row || !Array.isArray(row.habits)) return null;
      return row;
    } catch (_) {
      return null;
    }
  }

  function normalizeHabitShell(raw) {
    if (!raw || typeof raw !== "object") return null;
    const id = typeof raw.id === "string" ? raw.id : null;
    const title = typeof raw.title === "string" ? raw.title : "";
    const start = typeof raw.start === "string" ? raw.start : "";
    const days =
      raw.days && typeof raw.days === "object" && !Array.isArray(raw.days) ? { ...raw.days } : {};
    if (!id) return null;
    return { id, title, start, days };
  }

  function habitsFetchUrl() {
    return (
      "/api/habits?required_for_date=" + encodeURIComponent(focusDateIso)
    );
  }

  function ingestMandatoryPlannerHabits(apiRow) {
    latestMandatoryHabits = [];
    if (!apiRow || typeof apiRow !== "object") return;
    const arr = apiRow.mandatory_for_planner_date;
    if (!Array.isArray(arr)) return;
    for (let i = 0; i < arr.length; i++) {
      const row = arr[i];
      if (!row || typeof row !== "object") continue;
      const habitId = typeof row.habit_id === "string" ? row.habit_id.trim() : "";
      const title = typeof row.title === "string" ? row.title.trim() : "";
      const target =
        typeof row.target_date === "string" ? row.target_date.trim() : "";
      if (!habitId || !title || target !== focusDateIso) continue;
      const dm =
        typeof row.duration_minutes === "number" && row.duration_minutes > 0
          ? row.duration_minutes
          : 20;
      latestMandatoryHabits.push({
        habit_id: habitId,
        title: title,
        duration_minutes: dm,
        target_date: target,
        logged: !!row.logged,
        reason: typeof row.reason === "string" ? row.reason.trim() : "",
      });
    }
  }

  function renderMandatoryHabits() {
    if (!agendaHabitsList || !agendaHabitsSubhead) return;
    const hasAny = latestMandatoryHabits.length > 0;
    agendaHabitsSubhead.hidden = !hasAny;
    agendaHabitsList.hidden = !hasAny;
    if (!hasAny) {
      agendaHabitsList.innerHTML = "";
      return;
    }
    const cards = latestMandatoryHabits.map(function (row) {
      return {
        title: row.title,
        start_label: row.logged ? "Logged" : "Due today",
        duration_minutes: row.duration_minutes,
        status: row.logged ? "done" : "pending",
        habit_id: row.habit_id,
        logged: row.logged,
        habitDeadlineReason: row.reason,
      };
    });
    renderTaskCards(agendaHabitsList, cards, "", {
      allowHabitLogComplete: true,
    });
  }

  async function markHabitLoggedOnCalendar(habitId) {
    if (!habitId || habitLogInFlight) return;
    habitLogInFlight = true;
    statusEl.textContent = "Logging habit on calendar…";
    try {
      const r = await fetch("/api/habits", { cache: "no-store" });
      if (!r.ok) {
        statusEl.textContent = "Could not load habits (" + r.status + ").";
        return;
      }
      const snap = await r.json().catch(() => null);
      if (!snap || !Array.isArray(snap.habits)) {
        statusEl.textContent = "Habits data unavailable.";
        return;
      }
      let found = false;
      for (let i = 0; i < snap.habits.length; i++) {
        const h = snap.habits[i];
        if (!h || typeof h !== "object" || h.id !== habitId) continue;
        found = true;
        if (!h.days || typeof h.days !== "object") h.days = {};
        h.days[focusDateIso] = true;
        break;
      }
      if (!found) {
        statusEl.textContent = "Habit not found.";
        return;
      }
      const up = await fetch("/api/habits", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(snap),
      });
      if (!up.ok) {
        const msg = await up.text().catch(() => "");
        statusEl.textContent = "Could not save habit" + (msg ? ": " + msg : ".");
        return;
      }
      const frame = document.getElementById("habits-frame");
      if (frame && frame.contentWindow) {
        frame.contentWindow.postMessage(
          { source: "scheduler-shell", type: "habits-reload" },
          window.location.origin,
        );
      }
      await syncHabitsFromStorage();
      statusEl.textContent = "Habit logged on calendar.";
    } catch (e) {
      statusEl.textContent = String(e && e.message ? e.message : e);
    } finally {
      habitLogInFlight = false;
    }
  }

  async function loadHabitsFromBuilderStorage() {
    let row = await readHabitStateRow();
    if (!row || !Array.isArray(row.habits)) row = habitsFromLsBackup();
    if (!row || !Array.isArray(row.habits)) return [];

    const out = [];
    for (let i = 0; i < row.habits.length; i++) {
      const h = normalizeHabitShell(row.habits[i]);
      if (h) out.push(h);
    }
    return out;
  }

  async function syncHabitsFromStorage() {
    try {
      const r = await fetch(habitsFetchUrl(), { cache: "no-store" });
      if (r.ok) {
        const row = await r.json().catch(() => null);
        if (row && Array.isArray(row.habits)) {
          ingestMandatoryPlannerHabits(row);
          latestHabits = [];
          for (let i = 0; i < row.habits.length; i++) {
            const h = normalizeHabitShell(row.habits[i]);
            if (h) latestHabits.push(h);
          }
          renderMandatoryHabits();
          return latestHabits;
        }
      }
    } catch (_) {}
    latestMandatoryHabits = [];
    renderMandatoryHabits();
    latestHabits = await loadHabitsFromBuilderStorage();
    return latestHabits;
  }

  function buildHabitsBlockForModel(habits) {
    if (!habits.length) return "";
    const cap = habits.slice(0, 48);
    const bullets = [];
    for (let i = 0; i < cap.length; i++) {
      const h = cap[i];
      let line = "- " + (h.title || "(habit)");
      if (h.start) line += " (program start " + h.start + ")";
      bullets.push(line);
    }
    return (
      bullets.join("\n") +
      "\n\nThese are active Habit Builder items for awareness only. Do not schedule every " +
      "habit just because it exists; separate required-habit context will say when one must " +
      "be added to keep the user on track."
    );
  }

  function stripReasoningBlocks(text) {
    let t = String(text || "");
    t = t.replace(/<\s*(?:redacted_)?(?:think|thinking)\b[^>]*>[\s\S]*?<\s*\/\s*(?:redacted_)?(?:think|thinking)\s*>/gi, "");
    const openRe = /<\s*(?:redacted_)?(?:think|thinking)\b[^>]*>/gi;
    let lastOpenStart = -1;
    let om;
    while ((om = openRe.exec(t)) !== null) {
      lastOpenStart = om.index;
    }
    if (lastOpenStart >= 0) {
      const fromOpen = t.slice(lastOpenStart);
      if (!/<\s*\/\s*(?:redacted_)?(?:think|thinking)\s*>/i.test(fromOpen)) {
        t = t.slice(0, lastOpenStart);
      }
    }
    t = t.replace(/<\s*\/\s*(?:redacted_)?(?:think|thinking)\s*>/gi, "");
    return t.replace(/\n{3,}/g, "\n\n").trim();
  }

  /** Recover user-visible text when a spurious second `` tag makes ``unsafe). */
  function assistantVisibleTailAfterReasoningClose(raw) {
    const s = String(raw || "");
    const re = /<\s*\/\s*(?:redacted_)?(?:think|thinking)\s*>/gi;
    let lastEnd = -1;
    let m;
    while ((m = re.exec(s)) !== null) {
      lastEnd = m.index + m[0].length;
    }
    if (lastEnd < 0) {
      return "";
    }
    return s.slice(lastEnd).trim();
  }

  function activeReasoningText(text) {
    const raw = String(text || "");
    const open = raw.match(/<\s*(?:redacted_)?(?:think|thinking)\b[^>]*>/i);
    if (!open) return "";
    const afterOpen = raw.slice((open.index || 0) + open[0].length);
    const close = afterOpen.search(/<\s*\/\s*(?:redacted_)?(?:think|thinking)\s*>/i);
    if (close >= 0) return "";
    return afterOpen.trim();
  }

  function stripHostFactsPrefix(text) {
    let t = String(text || "");
    while (/^\s*\[(?:Facts|Meta)\s+—[\s\S]*?\]\s*/.test(t)) {
      const blank = t.search(/\n\s*\n/);
      if (blank < 0) break;
      t = t.slice(blank).trim();
    }
    return t.trim();
  }

  function displayTextForMessage(role, content) {
    if (role === "assistant") return stripReasoningBlocks(content);
    if (role === "user") return stripHostFactsPrefix(content);
    return String(content || "").trim();
  }

  /** Minute-of-day for labels like ``8:00 AM`` or ``2026-05-09 7:43 PM`` — matches scheduler_store.start_label_sort_minutes. */
  function startLabelSortMinutes(s) {
    const m = String(s || "")
      .trim()
      .match(/^(?:\d{4}-\d{2}-\d{2}\s+)?(\d{1,2})\s*:\s*(\d{2})\s*(AM|PM)$/i);
    if (!m) return 24 * 60 + 1;
    let h = Number(m[1]);
    const mi = Number(m[2]);
    const ap = m[3].toUpperCase();
    let hour24;
    if (ap === "PM") hour24 = h === 12 ? 12 : h + 12;
    else hour24 = h === 12 ? 0 : h;
    return hour24 * 60 + mi;
  }

  async function markTaskCompleteViaLlm(task) {
    const taskId = task && typeof task.task_id === "string" ? task.task_id : "";
    const title = task && typeof task.title === "string" ? task.title.trim() : "";
    if (!taskId || !title) return;
    try {
      statusEl.textContent = "Marking task complete…";
      const r = await fetch("/api/tasks/complete", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ task_id: taskId, status: "done" }),
      });
      if (!r.ok) {
        const msg = await r.text().catch(() => "");
        statusEl.textContent = "Could not mark task complete" + (msg ? ": " + msg : ".");
        return;
      }
      await reloadDbAgenda();
      if (!llmOnline) {
        statusEl.textContent = "Task marked done. LLM is offline, so the plan was not regenerated.";
        return;
      }
      if (requestInFlight) {
        statusEl.textContent =
          "Task marked done. A reply is already in progress — ask for an updated plan when it finishes.";
        return;
      }
      try {
        await runChatTurn("I finished " + title);
      } catch (err) {
        // eslint-disable-next-line no-console
        console.error("runChatTurn rejected", err);
        statusEl.textContent =
          "Send failed: " + String(err && err.message ? err.message : err);
      }
    } catch (e) {
      statusEl.textContent = String(e && e.message ? e.message : e);
    }
  }

  function renderTaskCards(container, tasks, emptyText, options) {
    const allowComplete = !!(options && options.allowComplete);
    const allowHabitLogComplete = !!(options && options.allowHabitLogComplete);
    if (!container) return;
    container.innerHTML = "";
    if (!tasks.length) {
      if (emptyText) {
        const div = document.createElement("div");
        div.className = "empty-card";
        div.textContent = emptyText;
        container.appendChild(div);
      }
      return;
    }
    const sorted = tasks.slice().sort(function (a, b) {
      if (allowHabitLogComplete) {
        const ad = a.logged ? 1 : 0;
        const bd = b.logged ? 1 : 0;
        if (ad !== bd) return ad - bd;
        return String(a.title || "").localeCompare(String(b.title || ""));
      }
      const ka = startLabelSortMinutes(a.start_label);
      const kb = startLabelSortMinutes(b.start_label);
      if (ka !== kb) return ka - kb;
      return String(a.title || "").localeCompare(String(b.title || ""));
    });
    for (const task of sorted) {
      const status = String(task.status || "pending");
      const dm = typeof task.duration_minutes === "number" ? task.duration_minutes : 0;
      const card = document.createElement("article");
      card.className = "task-card " + status;
      if (task.task_id) card.dataset.taskId = String(task.task_id);
      if (
        typeof task.habitDeadlineReason === "string" &&
        task.habitDeadlineReason.trim()
      ) {
        card.title = task.habitDeadlineReason.trim();
      }

      const top = document.createElement("div");
      top.className = "task-card-top";
      const title = document.createElement("div");
      title.className = "task-title";
      title.textContent = task.title || "(untitled task)";
      const actions = document.createElement("div");
      actions.className = "task-card-actions";
      const time = document.createElement("div");
      time.className = "task-time";
      time.textContent = task.start_label || "Anytime";
      top.appendChild(title);
      if (
        allowHabitLogComplete &&
        !task.logged &&
        task.habit_id &&
        status === "pending"
      ) {
        const logBtn = document.createElement("button");
        logBtn.type = "button";
        logBtn.className = "task-complete-btn";
        logBtn.textContent = "×";
        logBtn.title = "Log on habit calendar";
        logBtn.setAttribute(
          "aria-label",
          "Log " + (task.title || "habit") + " on the habit calendar",
        );
        logBtn.disabled = habitLogInFlight;
        logBtn.addEventListener("click", function () {
          logBtn.disabled = true;
          void markHabitLoggedOnCalendar(task.habit_id);
        });
        actions.appendChild(logBtn);
      }
      actions.appendChild(time);
      if (allowComplete && status === "pending" && task.task_id) {
        const doneBtn = document.createElement("button");
        doneBtn.type = "button";
        doneBtn.className = "task-complete-btn";
        doneBtn.textContent = "×";
        doneBtn.title = "Mark complete and regenerate the plan";
        doneBtn.setAttribute("aria-label", "Mark " + (task.title || "task") + " complete");
        doneBtn.disabled = requestInFlight;
        doneBtn.addEventListener("click", function () {
          doneBtn.disabled = true;
          void markTaskCompleteViaLlm(task);
        });
        actions.appendChild(doneBtn);
      }
      top.appendChild(actions);

      const meta = document.createElement("div");
      meta.className = "task-meta";
      const dur = document.createElement("span");
      dur.className = "task-chip";
      dur.textContent = durationLabelFromMinutes(dm);
      meta.appendChild(dur);
      const stat = document.createElement("span");
      stat.className = "task-chip";
      stat.textContent = allowHabitLogComplete
        ? task.logged
          ? "logged on calendar"
          : "habit due"
        : status;
      meta.appendChild(stat);

      card.appendChild(top);
      card.appendChild(meta);
      container.appendChild(card);
    }
  }

  function scrollChat() {
    chatScroll.scrollTop = chatScroll.scrollHeight;
  }

  function appendToChatStream(node) {
    const mount = getChatStreamMount();
    if (!mount || !chatScroll) return chatScroll.appendChild(node);
    mount.appendChild(node);
  }

  /** Clear transcript only — never wipe `#chat-scroll` (destroys `#chat-stream`). */
  function clearChatTranscript() {
    const m = getChatStreamMount();
    if (m) m.innerHTML = "";
    else if (chatScroll) chatScroll.innerHTML = "";
  }

  function appendMessageBubbleWithActions(role, content, histIndex) {
    let displayContent = displayTextForMessage(role, content);
    if (role === "assistant" && !displayContent) {
      const raw = String(content || "").trim();
      if (raw) {
        const tail = assistantVisibleTailAfterReasoningClose(raw);
        if (tail) {
          displayContent = stripReasoningBlocks(tail).trim() || tail;
        } else {
          displayContent = raw;
        }
      }
    }
    if (!displayContent) return;
    const wrap = document.createElement("div");
    wrap.className = "msg " + role;

    const actions = document.createElement("div");
    actions.className = "msg-actions";

    const copyBtn = document.createElement("button");
    copyBtn.type = "button";
    copyBtn.className = "msg-action-btn";
    copyBtn.textContent = "Copy";
    copyBtn.addEventListener("click", async function () {
      const ok = await copyTextToClipboard(displayContent);
      copyBtn.textContent = ok ? "Copied" : "Copy failed";
      window.setTimeout(function () {
        copyBtn.textContent = "Copy";
      }, 1400);
    });
    actions.appendChild(copyBtn);

    if (role === "user") {
      const editBtn = document.createElement("button");
      editBtn.type = "button";
      editBtn.className = "msg-action-btn";
      editBtn.textContent = "Edit";
      editBtn.addEventListener("click", function () {
        chatHistory = chatHistory.slice(0, histIndex);
        promptEl.value = displayContent;
        rerenderChatFromHistory();
        void fetch("/api/conversation", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ thread_id: "default", messages: chatHistory }),
        }).catch(function () {});
        statusEl.textContent = "(thread trimmed — edit and send)";
        refreshComposeStatus();
      });
      actions.appendChild(editBtn);
    }

    const body = document.createElement("div");
    body.className = role === "assistant" ? "msg-body-content msg-markdown" : "msg-body-content";
    if (role === "assistant") {
      let mountSrc = String(content || "");
      if (!stripReasoningBlocks(mountSrc).trim() && displayContent) {
        mountSrc = displayContent;
      }
      assistantMountMarkdown(body, mountSrc);
    } else {
      body.textContent = displayContent;
    }

    wrap.appendChild(body);
    wrap.appendChild(actions);
    appendToChatStream(wrap);
  }

  function rerenderChatFromHistory() {
    clearChatTranscript();
    for (let i = 0; i < chatHistory.length; i++) {
      appendMessageBubbleWithActions(chatHistory[i].role, chatHistory[i].content, i);
    }
    scrollChat();
  }

  /** @returns {{ wrap: HTMLElement, status: HTMLElement, thinking: HTMLElement, body: HTMLElement, thinkingQueue: string[], thinkingRaf: number | null }} */
  function assistantMessageShell() {
    const wrap = document.createElement("div");
    wrap.className = "msg assistant";
    const statusBubble = document.createElement("div");
    statusBubble.className = "msg-status";
    statusBubble.textContent = "Preparing request…";
    const thinkingEl = document.createElement("div");
    thinkingEl.className = "msg-thinking";
    thinkingEl.dataset.label = "Reasoning";
    thinkingEl.setAttribute("aria-label", "Model reasoning preview");
    const bodyEl = document.createElement("div");
    bodyEl.className = "msg-body msg-markdown";
    wrap.appendChild(statusBubble);
    wrap.appendChild(thinkingEl);
    wrap.appendChild(bodyEl);
    appendToChatStream(wrap);
    scrollChat();
    return {
      wrap: wrap,
      status: statusBubble,
      thinking: thinkingEl,
      body: bodyEl,
      thinkingQueue: [],
      thinkingRaf: null,
    };
  }

  /** Inline assistant bubble status only (mirrors CLI stderr-style detail). Never touches ``#chat-status``. */
  function setAssistantStatus(shell, text) {
    if (!shell || !shell.status) return;
    shell.status.textContent = text || "Working…";
  }

  function finishAssistantStatus(shell) {
    if (!shell || !shell.status) return;
    shell.status.remove();
  }

  /** Token-ish / word-ish pieces so the gray reasoning paints like MLX terminal streaming. */
  function splitThinkingRevealUnits(s) {
    if (!s) return [];
    const out = [];
    const re = /\S+|\s+/g;
    let m;
    while ((m = re.exec(s)) !== null) {
      let piece = m[0];
      if (piece.length > 28 && /^\S+$/.test(piece)) {
        const step = 4;
        for (let j = 0; j < piece.length; j += step) {
          out.push(piece.slice(j, j + step));
        }
      } else {
        out.push(piece);
      }
    }
    return out.length ? out : [s];
  }

  /** @param {{ thinking: HTMLElement, thinkingQueue: string[], thinkingRaf: number | null }} shell */
  function enqueueThinkingReveal(shell, text) {
    const units = splitThinkingRevealUnits(text);
    for (let i = 0; i < units.length; i++) {
      shell.thinkingQueue.push(units[i]);
    }
    if (shell.thinkingRaf != null) return;
    function tick() {
      if (!shell.thinkingQueue.length) {
        shell.thinkingRaf = null;
        return;
      }
      shell.thinking.textContent += shell.thinkingQueue.shift();
      shell.thinking.scrollTop = shell.thinking.scrollHeight;
      scrollChat();
      shell.thinkingRaf = requestAnimationFrame(tick);
    }
    shell.thinkingRaf = requestAnimationFrame(tick);
  }

  /** @param {{ thinking: HTMLElement, thinkingQueue: string[], thinkingRaf: number | null }} shell */
  function fadeThinkingAway(shell) {
    if (shell.thinkingRaf != null) {
      cancelAnimationFrame(shell.thinkingRaf);
      shell.thinkingRaf = null;
    }
    if (shell.thinkingQueue.length) {
      shell.thinking.textContent += shell.thinkingQueue.join("");
      shell.thinkingQueue.length = 0;
      shell.thinking.scrollTop = shell.thinking.scrollHeight;
      scrollChat();
    }
    const thEl = shell.thinking;
    if (!thEl || thEl.dataset.faded === "1") return;
    if (!String(thEl.textContent || "").trim()) {
      return;
    }
    thEl.dataset.faded = "1";
    thEl.classList.add("thinking-fading");
    window.setTimeout(function () {
      thEl.textContent = "";
      thEl.classList.remove("thinking-fading");
      delete thEl.dataset.faded;
    }, 520);
  }

  /** @returns {HTMLElement} */
  function bubble(role, content) {
    if (role === "assistant") {
      const shell = assistantMessageShell();
      assistantMountMarkdown(shell.body, content);
      return shell.wrap;
    }
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = displayTextForMessage(role, content);
    appendToChatStream(div);
    scrollChat();
    return div;
  }

  function setBusy(b) {
    requestInFlight = b;
    refreshComposeStatus();
    refreshSendEnabled();
  }

  async function persistAssistantTurn(assistText) {
    try {
      if (assistText && assistText.trim()) {
        try {
          await fetch("/api/tasks/import_from_assistant", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              assistant: assistText,
              client_local_date:
                lastImportDefaultPlanDateIso && /^\d{4}-\d{2}-\d{2}$/.test(lastImportDefaultPlanDateIso)
                  ? lastImportDefaultPlanDateIso
                  : lastAssistClientDateIso,
              client_clock_date: lastAssistClientDateIso,
              planner_focus_date_iso: focusDateIso,
            }),
          });
        } catch (_) {}
      }
      try {
        await fetch("/api/conversation", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ thread_id: "default", messages: chatHistory }),
        });
      } catch (_) {}
    } finally {
      try {
        await reloadDbAgenda();
      } catch (_) {}
    }
  }

  /** @param {(function(): void) | undefined} onUserBubblePainted Called right after the user bubble is in the transcript (queue may dequeue here). */
  async function runChatTurn(raw, onUserBubblePainted) {
    /** Wall-clock safety valve so a hung ``ReadableStream`` cannot strand the composer forever. */
    const CHAT_FETCH_TIMEOUT_MS = 600000;
    const chatAbort = new AbortController();
    let chatTurnTimeoutId = null;
    /** @type {string} */
    let fullAssistant = "";
    /** @type {string} */
    let streamedChat = "";
    let persisted = false;
    /** @type {{ wrap: HTMLElement, status: HTMLElement, thinking: HTMLElement, body: HTMLElement, thinkingQueue: string[], thinkingRaf: number | null } | null} */
    let shell = null;

    function assistantErr(msg) {
      if (!shell) return;
      finishAssistantStatus(shell);
      assistantMountMarkdown(shell.body, msg);
    }

    setBusy(true);
    setChatPhase("Loading habits and calendar context…");

    try {
      bubble("user", raw);
      if (typeof onUserBubblePainted === "function") {
        try {
          onUserBubblePainted();
        } catch (_) {}
      }
      await syncHabitsFromStorage();
      await syncCalendarBeforeChat();
      const habitsBlock = buildHabitsBlockForModel(latestHabits);
      const cc = clientCalendarPayload();
      lastAssistClientDateIso = cc.date_iso;
      lastImportDefaultPlanDateIso = cc.date_iso;

      shell = assistantMessageShell();
      setAssistantStatus(shell, "Sending request to local LLM…");

      const applyDoneEvent = async function (evt) {
        let historyUpdated = false;
        if (
          typeof evt.import_default_plan_date === "string" &&
          /^\d{4}-\d{2}-\d{2}$/.test(evt.import_default_plan_date.trim())
        ) {
          lastImportDefaultPlanDateIso = evt.import_default_plan_date.trim();
        } else {
          lastImportDefaultPlanDateIso = lastAssistClientDateIso;
        }
        if (Array.isArray(evt.history)) {
          chatHistory = evt.history.filter(function (h) {
            return (
              h &&
              (h.role === "user" || h.role === "assistant") &&
              typeof h.content === "string"
            );
          });
          historyUpdated = true;
        }
        if (typeof evt.assistant === "string" && evt.assistant) fullAssistant = evt.assistant;

        fadeThinkingAway(shell);

        if (evt.ok === false) {
          let errMsg = "";
          if (typeof evt.error === "string" && evt.error.trim()) {
            errMsg = evt.error.trim();
          } else if (
            Array.isArray(evt.fast_validation_reasons) &&
            evt.fast_validation_reasons.length
          ) {
            const r0 = evt.fast_validation_reasons[0];
            errMsg = typeof r0 === "string" ? r0 : String(r0);
          } else {
            errMsg = "The planner reply did not pass validation.";
          }
          persisted = true;
          assistantErr("Error: " + errMsg);
          if (historyUpdated) rerenderChatFromHistory();
          void persistAssistantTurn(fullAssistant).catch(function () {});
          try {
            chatAbort.abort();
          } catch (_) {}
          return;
        }

        const assembled =
          (typeof fullAssistant === "string" && fullAssistant.trim()
            ? fullAssistant.trim()
            : "") ||
          (typeof streamedChat === "string" && streamedChat.trim() ? streamedChat.trim() : "") ||
          (typeof evt.chat === "string" && evt.chat.trim() ? evt.chat.trim() : "");
        persisted = true;
        try {
          assistantMountMarkdown(shell.body, assembled);
        } catch (mountErr) {
          // eslint-disable-next-line no-console
          console.error("[chat] assistantMountMarkdown in applyDoneEvent:", mountErr);
          shell.body.textContent = assembled;
        }

        if (historyUpdated) rerenderChatFromHistory();

        finishAssistantStatus(shell);
        void persistAssistantTurn(fullAssistant).catch(function () {});
        try {
          chatAbort.abort();
        } catch (_) {}
      };

      const applyReplacementEvent = async function (evt) {
        let historyUpdated = false;
        if (
          typeof evt.import_default_plan_date === "string" &&
          /^\d{4}-\d{2}-\d{2}$/.test(evt.import_default_plan_date.trim())
        ) {
          lastImportDefaultPlanDateIso = evt.import_default_plan_date.trim();
        } else {
          lastImportDefaultPlanDateIso = lastAssistClientDateIso;
        }
        if (Array.isArray(evt.history)) {
          chatHistory = evt.history.filter(function (h) {
            return (
              h &&
              (h.role === "user" || h.role === "assistant") &&
              typeof h.content === "string"
            );
          });
          historyUpdated = true;
        }
        if (typeof evt.assistant === "string" && evt.assistant) fullAssistant = evt.assistant;
        streamedChat = "";
        setAssistantStatus(shell, "Applying fallback refinement…");
        fadeThinkingAway(shell);
        const assembledRp =
          (typeof evt.chat === "string" && evt.chat.trim() ? evt.chat.trim() : "") ||
          (typeof fullAssistant === "string" && fullAssistant.trim() ? fullAssistant.trim() : "");
        persisted = true;
        try {
          assistantMountMarkdown(shell.body, assembledRp);
        } catch (mountErr) {
          // eslint-disable-next-line no-console
          console.error("[chat] assistantMountMarkdown in applyReplacementEvent:", mountErr);
          shell.body.textContent = assembledRp;
        }

        if (historyUpdated) rerenderChatFromHistory();
        if (typeof evt.reason === "string" && evt.reason) {
          statusEl.textContent = "Plan refined by fallback model: " + evt.reason;
        }
        finishAssistantStatus(shell);
        void persistAssistantTurn(fullAssistant).catch(function () {});
        try {
          chatAbort.abort();
        } catch (_) {}
      };

      chatTurnTimeoutId = setTimeout(function () {
        chatAbort.abort();
      }, CHAT_FETCH_TIMEOUT_MS);

      setAssistantStatus(shell, "Sending request to local LLM…");
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        signal: chatAbort.signal,
        body: JSON.stringify({
          history: chatHistory,
          content: raw,
          habits_block: habitsBlock,
          client_calendar: cc,
        }),
      });
      if (!res.ok || !res.body) {
        const errText = await res.text().catch(() => "");
        assistantErr("Request failed (" + res.status + "): " + errText);
        return;
      }

      setChatPhase("Planner is replying…");
      setAssistantStatus(shell, "Connected. Waiting for the model to start streaming…");
      const reader = res.body.getReader();

      /** Stop waiting on ``reader.read()`` after terminal NDJSON — upstream may keep the TCP connection alive indefinitely (same symptom as a hung CLI ``read()`` after EOF never arrives). */
      async function stopBodyReaderEarly(reason) {
        try {
          await reader.cancel(typeof reason === "string" ? reason : "done");
        } catch (_) {}
      }

      const decoder = new TextDecoder();
      let buf = "";

      readLoop: while (true) {
        const chunk = await reader.read();
        if (chunk.done) {
          const tail = buf.trim();
          if (tail) {
            try {
              const evt = JSON.parse(tail);
              if (evt.type === "done") {
                try {
                  await applyDoneEvent(evt);
                } catch (err) {
                  // eslint-disable-next-line no-console
                  console.error("[chat] applyDoneEvent failed:", err);
                }
                if (persisted) {
                  await stopBodyReaderEarly("ndjson_done");
                  break readLoop;
                }
              } else if (evt.type === "replacement") {
                try {
                  await applyReplacementEvent(evt);
                } catch (err) {
                  // eslint-disable-next-line no-console
                  console.error("[chat] applyReplacementEvent failed:", err);
                }
                if (persisted) {
                  await stopBodyReaderEarly("ndjson_replacement");
                  break readLoop;
                }
              }
            } catch (_) {}
          }
          // NDJSON tail truncated or missing ``done`` — stream deltas already painted the reply.
          if (!persisted && streamedChat.trim()) {
            fadeThinkingAway(shell);
            fullAssistant = streamedChat.trim();
            try {
              assistantMountMarkdown(shell.body, fullAssistant);
              persisted = true;
              finishAssistantStatus(shell);
              void persistAssistantTurn(fullAssistant).catch(function () {});
              try {
                chatAbort.abort();
              } catch (_) {}
            } catch (err) {
              // eslint-disable-next-line no-console
              console.error("[chat] stream-close fallback failed:", err);
            }
          }
          break readLoop;
        }
        buf += decoder.decode(chunk.value, { stream: true });
        let nl;
        while ((nl = buf.indexOf("\n")) >= 0) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (!line) continue;
          let evt;
          try {
            evt = JSON.parse(line);
          } catch {
            continue;
          }
          if (evt.type === "thinking_end") {
            setAssistantStatus(shell, "Reasoning complete. Drafting the visible reply…");
            fadeThinkingAway(shell);
          }
          if (evt.type === "delta" && typeof evt.text === "string") {
            if (evt.phase === "thinking") {
              setAssistantStatus(shell, "Reasoning through the plan…");
              enqueueThinkingReveal(shell, evt.text);
            } else {
              setAssistantStatus(shell, "Writing the reply…");
              streamedChat += evt.text;
              const leakedReasoning = activeReasoningText(streamedChat);
              if (leakedReasoning) {
                shell.thinking.dataset.label = "Reasoning from stream";
                shell.thinking.textContent = leakedReasoning;
                shell.thinking.scrollTop = shell.thinking.scrollHeight;
              } else {
                fadeThinkingAway(shell);
              }
              assistantMountMarkdown(shell.body, streamedChat);
              scrollChat();
            }
          }
          if (evt.type === "done") {
            try {
              await applyDoneEvent(evt);
            } catch (err) {
              // eslint-disable-next-line no-console
              console.error("[chat] applyDoneEvent failed:", err);
            }
            if (persisted) {
              await stopBodyReaderEarly("ndjson_done");
              break readLoop;
            }
          }
          if (evt.type === "replacement") {
            try {
              await applyReplacementEvent(evt);
            } catch (err) {
              // eslint-disable-next-line no-console
              console.error("[chat] applyReplacementEvent failed:", err);
            }
            if (persisted) {
              await stopBodyReaderEarly("ndjson_replacement");
              break readLoop;
            }
          }
        }
      }

      try {
        chatAbort.abort();
      } catch (_) {}
    } catch (e) {
      const detail = e && e.message ? e.message : e;
      const msg =
        e && e.name === "AbortError"
          ? "Planner request timed out or was stopped (try again)."
          : String(detail);
      if (shell) {
        assistantErr(msg);
      } else {
        statusEl.textContent = msg;
      }
    } finally {
      if (chatTurnTimeoutId !== null) {
        clearTimeout(chatTurnTimeoutId);
        chatTurnTimeoutId = null;
      }
      // Always unlock the composer first — never ``await`` persistence here (matches CLI: the
      // interactive loop resumes as soon as generation finishes). Slow SQLite / POST must not
      // strand ``requestInFlight`` or ``#chat-status`` on the last delta-phase string.
      if (shell) {
        finishAssistantStatus(shell);
      }
      setChatPhase("");
      setBusy(false);
      scrollChat();
      void pollLlmHealth();
      refreshComposeStatus();
      if (!persisted && shell) {
        const fallbackAssist =
          (fullAssistant && fullAssistant.trim()) ||
          (streamedChat && streamedChat.trim()) ||
          "";
        if (fallbackAssist) {
          try {
            assistantMountMarkdown(shell.body, fallbackAssist);
          } catch (_) {}
        }
        void persistAssistantTurn(fallbackAssist).catch(function () {});
      }
    }
  }

  async function handleSend() {
    const raw = promptEl.value.trim();
    if (!raw) {
      if (llmOnline && pendingChatQueue.length > 0 && !chatQueueDrainPromise && !requestInFlight) {
        ensureChatQueueDrain();
      }
      return;
    }
    if (!llmOnline) {
      statusEl.textContent =
        "LLM API offline — set VLLM_14B_BASE_URL and run scheduler_llm_gateway.py (samples-vllm)";
      return;
    }
    promptEl.value = "";
    enqueueChatUserText(raw);
    ensureChatQueueDrain();
  }

  sendBtn.addEventListener("click", handleSend);
  promptEl.addEventListener("keydown", function (ev) {
    if (ev.key !== "Enter" || ev.isComposing) return;
    if (ev.shiftKey) return;
    ev.preventDefault();
    void handleSend();
  });

  window.addEventListener("message", function (ev) {
    if (ev.origin !== window.location.origin) return;
    const d = ev.data;
    if (d && d.source === "scheduler-habit-builder" && d.type === "habits-updated") {
      void syncHabitsFromStorage();
    }
  });

  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) void syncHabitsFromStorage();
  });

  const habitsFrameEl = document.getElementById("habits-frame");
  if (habitsFrameEl) {
    habitsFrameEl.addEventListener("load", function () {
      void syncHabitsFromStorage();
      try {
        if (habitsFrameEl.contentWindow) {
          habitsFrameEl.contentWindow.postMessage(
            {
              source: "scheduler-shell",
              type: "theme",
              theme: document.documentElement.dataset.theme || "light",
            },
            window.location.origin,
          );
        }
      } catch (_) {}
    });
  }

  clearBtn.addEventListener("click", function () {
    void fetch("/api/conversation", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ thread_id: "default", messages: [] }),
    }).catch(function () {});
    resetChatAndPreviewUi("(thread cleared)");
  });

  async function hydrateConversationFromServer() {
    try {
      const r = await fetch("/api/conversation?thread_id=default", { cache: "no-store" });
      if (!r.ok) return;
      const j = await r.json().catch(() => ({}));
      const msgs = j.messages || [];
      if (!msgs.length) return;
      chatHistory = msgs.filter(function (h) {
        return (
          h &&
          (h.role === "user" || h.role === "assistant") &&
          typeof h.content === "string"
        );
      });
      clearChatTranscript();
      rerenderChatFromHistory();
    } catch (_) {}
  }

  refreshFocusChrome();
  void reloadDbAgenda();
  void (async function plannerBootstrapHydratePreview() {
    await hydrateConversationFromServer();
    await syncHabitsFromStorage();
  })();
})();
  </script>
</body>
</html>

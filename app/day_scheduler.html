<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Heartbeat — Scheduler</title>
  <script src="heartbeat_theme.js"></script>
  <script>
    HeartbeatTheme.paintDocumentTheme();
  </script>
  <link rel="stylesheet" href="heartbeat_shell.css" />
  <style>
    /* Morning theme — sunny sky blue, fresh garden tones, soft floral accents. */
    :root {
      color-scheme: light;
      --bg: #f0f7fd;
      --panel: #fafcff;
      --panel-translucent: rgba(250, 252, 255, 0.88);
      --soft: #e6f2fb;
      --border: #c5dcef;
      --border-soft: #dceaf7;
      --text: #1e3348;
      --muted: #5a7288;
      --accent: #2288dd;
      --accent-soft: #d6ebfa;
      --accent-strong: #1a6bb8;
      --on-accent: #ffffff;
      --bg-spot: rgba(34, 136, 221, 0.11);
      --shadow: 0 18px 45px rgba(30, 70, 120, 0.08);
      --shadow-soft: 0 8px 24px rgba(30, 70, 120, 0.05);
      --chat-bg-from: rgba(250, 252, 255, 0.65);
      --chat-bg-to: rgba(236, 244, 252, 0.92);
      --chat-surface: rgba(250, 252, 255, 0.75);
      --user-msg-from: #e0eef9;
      --user-msg-to: #ebe6f6;
      --user-msg-border: #b8d4ef;
      --assist-msg-bg: #fafcff;
      --action-btn-bg: rgba(250, 252, 255, 0.88);
      --action-btn-border: #c5dcef;
      --action-btn-color: #2a4560;
      --action-btn-hover: #e6f2fb;
      --thinking-bg: #edf2fa;
      --thinking-border: #cddff0;
      --thinking-color: #4a6580;
      --thinking-label: #6a8498;
      --input-bg: #ffffff;
      --input-border: #b8cfe4;
      --input-focus-border: #5aa8e8;
      --input-focus-ring: rgba(34, 136, 221, 0.18);
      --pill-online-bg: #dcf5e4;
      --pill-online-border: #8ecba0;
      --pill-online-color: #1f5632;
      --pill-offline-bg: #fce8ec;
      --pill-offline-border: #e8a8b4;
      --pill-offline-color: #8b3048;
      --pill-default-border: #c5dcef;
      --warn-bg: #fdf0e8;
      --warn-bg-hover: #f5e0d0;
      --warn-border: #e8c4a8;
      --warn-border-hover: #d8a888;
      --warn-text: #8b5030;
      --success-bg: #dcf5e8;
      --success-bg-hover: #c8ecd4;
      --success-border: #8ecba8;
      --success-text: #1f5632;
      --task-card-bg: rgba(250, 252, 255, 0.95);
      --task-card-pending-bar: var(--accent);
      --task-card-done-bar: #3d9960;
      --task-card-cancel-bar: #8a9eb0;
      --button-bg: #e6f2fb;
      --button-border: #c5dcef;
      --button-hover-bg: #d6ebfa;
      --button-text: #1e3348;
      --empty-border: #b8cfe4;
      --status-text: #5a7288;
      --nav-link-bg: rgba(250, 252, 255, 0.60);
      --nav-link-hover-bg: #e6f2fb;
      --nav-tab-active-bg: var(--accent-soft);
      --nav-tab-active-border: var(--accent-strong);
    }

    /* Afternoon theme — golden-hour warmth: honey cream, amber accent, espresso text. */
    :root[data-theme="afternoon"] {
      color-scheme: light;
      --bg: #f9f0dc;
      --panel: #fdf8eb;
      --panel-translucent: rgba(253, 248, 235, 0.88);
      --soft: #f3e8cc;
      --border: #e8d4a8;
      --border-soft: #efe2c4;
      --text: #3d2e1a;
      --muted: #8a7347;
      --accent: #c17a0a;
      --accent-soft: #f5e4c4;
      --accent-strong: #9a5f06;
      --on-accent: #fffdf8;
      --bg-spot: rgba(193, 122, 10, 0.12);
      --shadow: 0 18px 45px rgba(120, 85, 30, 0.12);
      --shadow-soft: 0 8px 24px rgba(120, 85, 30, 0.08);
      --chat-bg-from: rgba(253, 248, 235, 0.62);
      --chat-bg-to: rgba(249, 240, 220, 0.92);
      --chat-surface: rgba(253, 248, 235, 0.72);
      --user-msg-from: #f8ead0;
      --user-msg-to: #fdf3e0;
      --user-msg-border: #e0c88a;
      --assist-msg-bg: #fdf8eb;
      --action-btn-bg: rgba(253, 248, 235, 0.85);
      --action-btn-border: #dcc99a;
      --action-btn-color: #4a3818;
      --action-btn-hover: #f3e8cc;
      --thinking-bg: #f3e8cc;
      --thinking-border: #e0d0a8;
      --thinking-color: #6b5630;
      --thinking-label: #9a8450;
      --input-bg: #fff9ed;
      --input-border: #dcc99a;
      --input-focus-border: #c9953a;
      --input-focus-ring: rgba(193, 122, 10, 0.20);
      --pill-online-bg: #e4f0d4;
      --pill-online-border: #a5c98a;
      --pill-online-color: #3a5618;
      --pill-offline-bg: #f5dcc8;
      --pill-offline-border: #d99a82;
      --pill-offline-color: #8b3814;
      --pill-default-border: #dcc99a;
      --warn-bg: #fce8d0;
      --warn-bg-hover: #f5d8b0;
      --warn-border: #e8b878;
      --warn-border-hover: #d99a50;
      --warn-text: #9b5a0e;
      --success-bg: #e4efd0;
      --success-bg-hover: #d4e3b8;
      --success-border: #b9c878;
      --success-text: #4a5a16;
      --task-card-bg: rgba(253, 248, 235, 0.95);
      --task-card-pending-bar: var(--accent);
      --task-card-done-bar: #6a8233;
      --task-card-cancel-bar: #b0a080;
      --button-bg: #f3e8cc;
      --button-border: #dcc99a;
      --button-hover-bg: #e8d9b0;
      --button-text: #4a3818;
      --empty-border: #d4c090;
      --status-text: #8a7347;
      --nav-link-bg: rgba(253, 248, 235, 0.55);
      --nav-link-hover-bg: #f3e8cc;
      --nav-tab-active-bg: var(--accent-soft);
      --nav-tab-active-border: var(--accent-strong);
    }

    /* Night theme — calm moonlit blues, low contrast, easy on the eyes at night. */
    :root[data-theme="dark"] {
      color-scheme: dark;
      --bg: #131820;
      --panel: #1a2030;
      --panel-translucent: rgba(26, 32, 48, 0.82);
      --soft: #1e2636;
      --border: #2a3448;
      --border-soft: #222a3a;
      --text: #b0bac8;
      --muted: #6e7a8c;
      --accent: #7a9ec4;
      --accent-soft: #1e2a3c;
      --accent-strong: #8eb0d0;
      --on-accent: #0e141c;
      --bg-spot: rgba(122, 158, 196, 0.05);
      --shadow: 0 18px 45px rgba(0, 0, 0, 0.40);
      --shadow-soft: 0 8px 24px rgba(0, 0, 0, 0.28);
      --chat-bg-from: rgba(26, 32, 48, 0.55);
      --chat-bg-to: rgba(19, 24, 32, 0.92);
      --chat-surface: rgba(26, 32, 48, 0.72);
      --user-msg-from: #1e2638;
      --user-msg-to: #1a2230;
      --user-msg-border: #2e3a50;
      --assist-msg-bg: #1c2434;
      --action-btn-bg: rgba(30, 38, 54, 0.85);
      --action-btn-border: #2e3a50;
      --action-btn-color: #98a4b4;
      --action-btn-hover: #242e42;
      --thinking-bg: #181e2c;
      --thinking-border: #2a3448;
      --thinking-color: #788898;
      --thinking-label: #586878;
      --input-bg: #161c28;
      --input-border: #2a3448;
      --input-focus-border: #6a8eb0;
      --input-focus-ring: rgba(122, 158, 196, 0.16);
      --pill-online-bg: #1a2e24;
      --pill-online-border: #2e5840;
      --pill-online-color: #88b898;
      --pill-offline-bg: #2a2024;
      --pill-offline-border: #584040;
      --pill-offline-color: #c09898;
      --pill-default-border: #2a3448;
      --warn-bg: #2a2220;
      --warn-bg-hover: #342a28;
      --warn-border: #584038;
      --warn-border-hover: #685048;
      --warn-text: #c09888;
      --success-bg: #1a2a22;
      --success-bg-hover: #223428;
      --success-border: #2e5840;
      --success-text: #88b898;
      --task-card-bg: rgba(26, 32, 48, 0.95);
      --task-card-pending-bar: var(--accent);
      --task-card-done-bar: #588868;
      --task-card-cancel-bar: #485868;
      --button-bg: #1e2636;
      --button-border: #2a3448;
      --button-hover-bg: #242e42;
      --button-text: #a8b4c4;
      --empty-border: #2a3448;
      --status-text: #6e7a8c;
      --nav-link-bg: rgba(30, 38, 54, 0.55);
      --nav-link-hover-bg: #242e42;
      --nav-tab-active-bg: var(--accent-soft);
      --nav-tab-active-border: var(--accent-strong);
    }

    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, var(--bg-spot), transparent 32rem),
        var(--bg);
      transition: background-color 0.4s ease, color 0.4s ease;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-template-rows: auto 1fr;
      height: 100%;
      max-height: 100vh;
      max-height: 100dvh;
      gap: 0;
    }
    .col {
      border-right: 1px solid var(--border);
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    @supports (grid-template-rows: subgrid) {
      .col {
        display: grid;
        grid-template-rows: subgrid;
        grid-row: span 2;
      }
      .col-header {
        min-height: 0;
      }
    }
    .col:last-child { border-right: none; }
    .col-header {
      flex: 0 0 auto;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      min-height: 6.35rem;
      padding: 0.7rem 0.9rem;
      font-weight: 600;
      font-size: 0.95rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel-translucent);
      backdrop-filter: blur(14px);
      color: var(--text);
    }
    .header-shell {
      display: flex;
      flex: 1 1 auto;
      flex-direction: column;
      align-items: stretch;
      gap: 0.55rem;
      min-height: 0;
    }
    .header-title {
      display: flex;
      flex-direction: column;
      gap: 0.18rem;
      min-width: 7rem;
    }
    .header-title strong {
      font-size: 0.98rem;
      letter-spacing: -0.015em;
      line-height: 1.15;
    }
    .header-kicker {
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 500;
      line-height: 1.2;
    }
    .header-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 0.38rem;
      min-width: 0;
    }
    .header-shell-planner .header-toolbar {
      margin-top: auto;
      flex-shrink: 0;
    }
    .header-shell:not(.header-shell-planner)::after {
      content: "";
      display: block;
      flex: 1 1 auto;
      margin-top: auto;
      min-height: 1.89rem;
    }
    .header-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      width: 100%;
      min-width: 0;
    }
    .header-toolbar .date-nav {
      flex: 0 1 auto;
      min-width: 0;
    }
    .header-toolbar .btn-clear-day {
      flex: 0 0 auto;
      margin-left: auto;
    }
    .sync-btn {
      cursor: pointer;
      font-weight: 700;
    }
    .llm-pill {
      display: inline-flex;
      align-items: center;
      min-height: 1.65rem;
      font-weight: 650;
      font-size: 0.72rem;
      line-height: 1;
      padding: 0.22rem 0.55rem;
      border-radius: 999px;
      border: 1px solid var(--pill-default-border);
      background: var(--soft);
      color: var(--muted);
      white-space: nowrap;
      max-width: 10.5rem;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .llm-pill.online {
      background: var(--pill-online-bg);
      border-color: var(--pill-online-border);
      color: var(--pill-online-color);
    }
    .llm-pill.offline {
      background: var(--pill-offline-bg);
      border-color: var(--pill-offline-border);
      color: var(--pill-offline-color);
    }
    .btn-clear-day {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 0.28rem 0.58rem;
      min-height: 1.65rem;
      border-radius: 999px;
      border: 1px solid var(--warn-border);
      background: var(--panel);
      color: var(--warn-text);
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-clear-day:hover {
      background: var(--warn-bg);
      border-color: var(--warn-border-hover);
    }
    .btn-clear-day:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.15rem;
      padding: 0.14rem;
      border-radius: 999px;
      background: var(--soft);
      border: 1px solid var(--border);
    }
    .theme-toggle button {
      padding: 0.18rem 0.55rem;
      font-size: 0.72rem;
      font-weight: 600;
      border-radius: 999px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
    }
    .btn-clear-day:focus-visible,
    .theme-toggle button:focus-visible,
    .llm-pill:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .theme-toggle button:hover {
      color: var(--text);
    }
    .theme-toggle button.active {
      background: var(--panel);
      border-color: var(--border);
      color: var(--text);
      box-shadow: var(--shadow-soft);
    }
    @media (max-width: 1180px) {
      .grid {
        grid-template-columns: 0.95fr 1.05fr 1fr;
      }
      .col-header {
        min-height: 6.75rem;
      }
      .header-shell {
        gap: 0.45rem;
      }
      .header-actions {
        justify-content: flex-start;
        width: 100%;
      }
    }
    .col-body {
      flex: 1 1 auto;
      overflow: hidden;
      min-height: 0;
    }
    #habits-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: var(--panel);
    }
    #agenda-body {
      padding: 0.85rem;
      overflow: auto;
      font-size: 0.92rem;
    }
    .date-line {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 0.5rem;
    }
    .planner-card-list {
      display: grid;
      gap: 0.6rem;
      margin-bottom: 1rem;
    }
    .task-card {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0.75rem 0.8rem;
      background: var(--task-card-bg);
      box-shadow: var(--shadow-soft);
      color: var(--text);
    }
    .task-card.pending {
      border-left: 4px solid var(--task-card-pending-bar);
    }
    .task-card.done {
      opacity: 0.72;
      border-left: 4px solid var(--task-card-done-bar);
    }
    .task-card.cancelled {
      opacity: 0.6;
      border-left: 4px solid var(--task-card-cancel-bar);
    }
    .task-card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.6rem;
      margin-bottom: 0.45rem;
    }
    .task-card-actions {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      flex: 0 0 auto;
    }
    .task-title {
      font-weight: 650;
      line-height: 1.25;
    }
    .task-time {
      flex: 0 0 auto;
      color: var(--accent);
      background: var(--accent-soft);
      border-radius: 999px;
      padding: 0.18rem 0.5rem;
      font-size: 0.78rem;
      font-weight: 650;
      white-space: nowrap;
    }
    .task-complete-btn {
      width: 1.65rem;
      height: 1.65rem;
      display: inline-grid;
      place-items: center;
      padding: 0;
      color: var(--success-text);
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      border-radius: 999px;
      font-size: 1rem;
      line-height: 1;
      cursor: pointer;
    }
    .task-complete-btn:hover {
      background: var(--success-bg-hover);
    }
    .task-complete-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .task-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      color: var(--muted);
      font-size: 0.78rem;
    }
    .task-chip {
      border: 1px solid var(--border);
      background: var(--soft);
      border-radius: 999px;
      padding: 0.12rem 0.45rem;
    }
    .empty-card {
      border: 1px dashed var(--empty-border);
      border-radius: 14px;
      color: var(--muted);
      background: var(--panel-translucent);
      padding: 0.75rem;
      line-height: 1.4;
    }
    .chat-col-body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      min-height: 0;
    }
    #chat-scroll {
      flex: 1 1 0;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      padding: 1.1rem 1rem 1.35rem;
      background:
        linear-gradient(180deg, var(--chat-bg-from), var(--chat-bg-to)),
        var(--bg);
    }
    .chat-stream {
      width: min(100%, 48rem);
      margin: 0 auto;
    }
    .msg {
      margin-bottom: 1rem;
      padding: 0.78rem 0.9rem;
      border-radius: 20px;
      max-width: min(88%, 43rem);
      font-size: 0.9rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: var(--shadow-soft);
      color: var(--text);
    }
    .msg.user {
      margin-left: auto;
      background: linear-gradient(135deg, var(--user-msg-from), var(--user-msg-to));
      border: 1px solid var(--user-msg-border);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .msg.assistant {
      margin-right: auto;
      background: var(--assist-msg-bg);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .msg-actions {
      align-self: flex-end;
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem;
      margin: 0;
    }
    .msg-action-btn {
      font-size: 0.72rem;
      padding: 0.14rem 0.46rem;
      cursor: pointer;
      background: var(--action-btn-bg);
      border: 1px solid var(--action-btn-border);
      border-radius: 999px;
      color: var(--action-btn-color);
    }
    .msg.user .msg-action-btn {
      background: var(--action-btn-bg);
    }
    .msg-action-btn:hover {
      background: var(--action-btn-hover);
    }
    .msg-body-content {
      white-space: pre-wrap;
      word-break: break-word;
    }
    /* Assistant replies render as sanitized Markdown (`marked` + DOMPurify). */
    .msg-markdown {
      white-space: normal;
    }
    .msg-markdown p {
      margin: 0 0 0.6em;
    }
    .msg-markdown p:last-child {
      margin-bottom: 0;
    }
    .msg-markdown h1,
    .msg-markdown h2,
    .msg-markdown h3,
    .msg-markdown h4 {
      margin: 0.35rem 0 0.55rem;
      font-size: 1.06rem;
      font-weight: 750;
      line-height: 1.25;
    }
    .msg-markdown h1 {
      font-size: 1.12rem;
    }
    .msg-markdown ul,
    .msg-markdown ol {
      margin: 0 0 0.6em;
      padding-left: 1.35rem;
      line-height: 1.4;
    }
    .msg-markdown li + li {
      margin-top: 0.35em;
    }
    .msg-markdown hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0.85rem 0;
    }
    .msg-markdown code {
      font-size: 0.86em;
      padding: 0.08rem 0.28rem;
      border-radius: 6px;
      background: rgba(34, 100, 160, 0.10);
    }
    :root[data-theme="dark"] .msg-markdown code {
      background: rgba(110, 122, 140, 0.16);
    }
    .msg-markdown pre code {
      display: block;
      padding: 0.52rem 0.58rem;
      overflow-x: auto;
      font-size: 0.82rem;
    }
    .msg-markdown strong {
      font-weight: 700;
    }
    .msg-markdown table {
      width: 100%;
      margin: 0.5rem 0 0.75rem;
      border-collapse: collapse;
      font-size: 0.82rem;
    }
    .msg-markdown th,
    .msg-markdown td {
      border: 1px solid var(--border);
      padding: 0.28rem 0.45rem;
      text-align: left;
      vertical-align: top;
    }
    .msg-markdown th {
      background: rgba(34, 100, 160, 0.06);
    }
    .msg-thinking {
      color: var(--thinking-color);
      font-size: 0.82rem;
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 18rem;
      overflow: auto;
      border: 1px solid var(--thinking-border);
      border-radius: 14px;
      padding: 0.55rem 0.65rem;
      background: var(--thinking-bg);
      transition:
        opacity 0.48s ease,
        max-height 0.52s ease,
        margin 0.45s ease,
        padding 0.45s ease,
        border-color 0.45s ease;
    }
    .msg-thinking::before {
      content: attr(data-label);
      display: block;
      color: var(--thinking-label);
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.25rem;
    }
    .msg-thinking.thinking-fading {
      opacity: 0;
      max-height: 0;
      margin: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-color: transparent;
      pointer-events: none;
    }
    .msg-thinking:empty {
      display: none;
    }
    .msg-status {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      width: fit-content;
      max-width: 100%;
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 600;
      line-height: 1.25;
      padding: 0.42rem 0.6rem;
      border: 1px solid var(--border-soft);
      border-radius: 999px;
      background: var(--soft);
    }
    .msg-status::before {
      content: "";
      width: 0.48rem;
      height: 0.48rem;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(34, 136, 221, 0.35);
      animation: pulse-dot 1.4s ease-in-out infinite;
      flex: 0 0 auto;
    }
    :root[data-theme="dark"] .msg-status::before {
      box-shadow: 0 0 0 0 rgba(122, 158, 196, 0.28);
    }
    @keyframes pulse-dot {
      0% { transform: scale(0.9); opacity: 0.55; }
      50% { transform: scale(1.15); opacity: 1; }
      100% { transform: scale(0.9); opacity: 0.55; }
    }
    .chat-compose {
      flex: 0 0 auto;
      min-height: 0;
      border-top: 1px solid var(--border);
      padding: 0.75rem 0.85rem;
      background: var(--chat-surface);
      backdrop-filter: blur(14px);
      box-shadow: 0 -10px 28px var(--shadow-soft);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .compose-box {
      width: min(100%, 48rem);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      padding: 0.45rem;
      border: 1px solid var(--input-border);
      border-radius: 20px;
      background: var(--input-bg);
      box-shadow: var(--shadow-soft);
    }
    .chat-compose textarea {
      width: 100%;
      resize: vertical;
      min-height: 3.1rem;
      max-height: 10rem;
      padding: 0.5rem 0.55rem;
      font-family: inherit;
      font-size: 0.9rem;
      border: 0;
      border-radius: 14px;
      background: transparent;
      color: var(--text);
      outline: none;
      box-shadow: none;
    }
    .compose-box:focus-within {
      border-color: var(--input-focus-border);
      box-shadow: 0 0 0 3px var(--input-focus-ring), var(--shadow-soft);
    }
    .chat-compose textarea::placeholder {
      color: var(--muted);
      opacity: 0.85;
    }
    .chat-row {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      justify-content: flex-end;
    }
    .compose-actions {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }

    /* Queued follow-ups (Cursor-style list) */
    .queue-panel {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      padding: 0.4rem 0.55rem 0.5rem;
      width: min(100%, 48rem);
      margin: 0 auto;
      background: var(--soft);
      border: 1px solid var(--border-soft);
      border-radius: 14px;
      max-height: 13rem;
      overflow: auto;
    }
    .queue-panel[hidden] { display: none; }
    .queue-head {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
      padding: 0.05rem 0.1rem;
    }
    .queue-twisty {
      width: 0.85rem;
      display: inline-flex;
      justify-content: center;
      transition: transform 0.12s ease;
    }
    .queue-panel[data-collapsed="true"] .queue-list { display: none; }
    .queue-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .queue-row {
      display: grid;
      grid-template-columns: 1.05rem 1fr auto;
      align-items: center;
      gap: 0.5rem;
      padding: 0.32rem 0.45rem;
      background: var(--panel);
      border: 1px solid var(--border-soft);
      border-radius: 0.5rem;
      font-size: 0.85rem;
      color: var(--text);
    }
    .queue-row.in-flight {
      border-color: var(--accent-soft);
      background: var(--accent-soft);
      opacity: 0.85;
    }
    .queue-row.actions-disabled .queue-actions {
      opacity: 0.45;
      pointer-events: none;
    }
    .queue-bullet {
      width: 0.85rem;
      height: 0.85rem;
      border-radius: 999px;
      border: 1.5px solid var(--muted);
      display: inline-block;
      box-sizing: border-box;
      opacity: 0.6;
    }
    .queue-row.in-flight .queue-bullet {
      border-color: var(--accent);
      background: var(--accent);
      opacity: 1;
    }
    .queue-text {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
    }
    .queue-actions {
      display: inline-flex;
      align-items: center;
      gap: 0.05rem;
    }
    .queue-act {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 999px;
      width: 1.7rem;
      height: 1.7rem;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1;
      cursor: pointer;
    }
    .queue-act:hover {
      background: var(--soft);
      border-color: var(--border-soft);
      color: var(--text);
    }
    .queue-act:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .queue-act.danger:hover {
      color: var(--warn-text);
      background: var(--warn-bg);
      border-color: var(--warn-border);
    }
    .queue-act svg {
      width: 0.95rem;
      height: 0.95rem;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    button {
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      background: var(--button-bg);
      border: 1px solid var(--button-border);
      border-radius: 999px;
      font-size: 0.85rem;
      color: var(--button-text);
    }
    button:hover { background: var(--button-hover-bg); }
    button.primary {
      background: var(--accent);
      color: var(--on-accent);
      border-color: var(--accent-strong);
    }
    button.primary:hover { background: var(--accent-strong); }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .status {
      font-size: 0.8rem;
      color: var(--status-text);
      min-height: 1rem;
      width: min(100%, 48rem);
      margin: 0 auto;
    }
    .subhead {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text);
      opacity: 0.78;
      margin: 0.8rem 0 0.45rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .muted { color: var(--muted); }
  </style>
</head>
